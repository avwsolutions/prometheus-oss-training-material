route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 2m
  repeat_interval: 5m
  receiver: default
  routes:
    - receiver: 'null'
      matchers:
        - alertname="DeadMansSwitch"
      continue: true
      active_time_intervals:
        - office-hours
    - receiver: 'operations'
      matchers:
        - alertname="DeadMansSwitch"
      active_time_intervals:
        - out-of-hours
    - receiver: 'operations'
      matchers:
      - severity=~"critical"
      continue: true
    - receiver: 'SRE'
      matchers:
      - severity=~"critical|warning|minor|clear|none"

receivers:
  - name: default
  - name: 'null'
  - name: operations
  - name: SRE
    slack_configs: 
      - api_url: 
        channel: "#support"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        text: |
          *Alert:* {{ .CommonLabels.alertname }}
          *Service:* {{ .CommonLabels.service }}
          *Severity:* {{ .CommonLabels.severity }}
          
          {{ range .Alerts }}
          • {{ .Annotations.summary }}
          {{ end }}

time_intervals:
  - name: office-hours
    time_intervals:
      - weekdays: ["monday:friday"]
        times:
          - start_time: "09:00"
            end_time: "17:00"

  - name: out-of-hours
    time_intervals:
      # Weekdays before 09:00
      - weekdays:
          - monday
          - tuesday
          - wednesday
          - thursday
          - friday
        times:
          - start_time: "00:00"
            end_time: "09:00"

      # Weekdays after 17:00
      - weekdays:
          - monday
          - tuesday
          - wednesday
          - thursday
          - friday
        times:
          - start_time: "17:00"
            end_time: "24:00"

      # Weekends (FULL day)
      - weekdays:
          - saturday
          - sunday
        times:
          - start_time: "00:00"
            end_time: "24:00"
   